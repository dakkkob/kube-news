# kube-news data source configuration
# Adding a new GitHub repo = one line under github_repos
# Adding a new RSS feed = one line under rss_feeds

github_repos:
  # Tier 1 — Core Kubernetes
  - owner: kubernetes
    repo: kubernetes
    schedule: daily
    description: "Kubernetes core releases and changelogs"

  - owner: kubernetes
    repo: enhancements
    schedule: weekly
    content_type: keps  # Special handling: browse KEP markdown files
    description: "KEPs — deprecation source of truth"

  # Tier 2 — CNCF Ecosystem
  - owner: kyverno
    repo: kyverno
    schedule: daily
    description: "Policy engine — CEL migration, non-CEL deprecation"

  - owner: helm
    repo: helm
    schedule: daily
    description: "Helm package manager releases"

  - owner: istio
    repo: istio
    schedule: daily
    description: "Service mesh releases and API changes"

  - owner: cert-manager
    repo: cert-manager
    schedule: daily
    description: "Certificate management — API changes"

  # Tier 3 — Extended CNCF
  - owner: helmfile
    repo: helmfile
    schedule: daily
    description: "Declarative Helm chart deployments"

  - owner: kubernetes-sigs
    repo: kustomize
    schedule: daily
    description: "Template-free K8s config customization"

  - owner: kubernetes-sigs
    repo: karpenter
    schedule: daily
    description: "Node autoscaler — key for EKS upgrades"

  - owner: aquasecurity
    repo: trivy
    schedule: daily
    description: "Container and K8s vulnerability scanner"

  - owner: falcosecurity
    repo: falco
    schedule: daily
    description: "Runtime security — CNCF graduated"

  - owner: prometheus
    repo: prometheus
    schedule: daily
    description: "Monitoring and alerting — CNCF graduated"

  - owner: etcd-io
    repo: etcd
    schedule: daily
    description: "K8s backing store — critical for cluster upgrades"

  - owner: containerd
    repo: containerd
    schedule: daily
    description: "Container runtime — CNCF graduated"

  - owner: google
    repo: cel-spec
    schedule: weekly
    description: "CEL language spec — tracks CEL adoption in K8s"

  - owner: envoyproxy
    repo: envoy
    schedule: daily
    description: "Proxy underpinning Istio and Gateway API"

rss_feeds:
  # Tier 1 — Core
  - url: "https://kubernetes.io/feed.xml"
    name: kubernetes-blog
    schedule: every_6h
    description: "Official K8s blog — announcements, migration guides"

  - url: "https://lwkd.info/feed.xml"
    name: lwkd
    schedule: daily
    description: "Last Week in Kubernetes Development"

  # Tier 2 — Ecosystem blogs
  - url: "https://istio.io/latest/news/feed.xml"
    name: istio-news
    schedule: daily
    description: "Istio-specific advisories and releases"

  - url: "https://kyverno.io/blog/index.xml"
    name: kyverno-blog
    schedule: weekly
    description: "Kyverno blog — CEL migration guides"

  # Tier 3 — Ecosystem & practitioner blogs
  - url: "https://marcincuber.medium.com/feed"
    name: marcin-cuber
    schedule: weekly
    description: "Marcin Cuber — detailed EKS upgrade guides"

  - url: "https://aws.amazon.com/blogs/containers/feed/"
    name: aws-containers
    schedule: daily
    description: "AWS Containers blog — EKS, ECS, Fargate"

  - url: "https://helm.sh/blog/index.xml"
    name: helm-blog
    schedule: weekly
    description: "Helm project blog — releases, deprecations"

  - url: "https://falco.org/feed.xml"
    name: falco-blog
    schedule: weekly
    description: "Falco runtime security blog"

  # Tier 4 — Aggregators
  - url: "https://www.cncf.io/feed/?post_type=lf_kubeweekly"
    name: kubeweekly
    schedule: weekly
    description: "KubeWeekly curated roundup"

  - url: "https://www.cncf.io/feed/"
    name: cncf-blog
    schedule: daily
    description: "CNCF project announcements, graduations"

cve_feeds:
  - url: "https://kubernetes.io/docs/reference/issues-security/official-cve-feed/index.json"
    name: kubernetes-cve
    schedule: every_6h
    description: "Official K8s CVE feed — no auth needed"

endoflife_products:
  - product: kubernetes
    schedule: daily
  - product: amazon-eks
    schedule: daily
  - product: google-kubernetes-engine
    schedule: daily
  - product: istio
    schedule: daily
  - product: cert-manager
    schedule: daily
  - product: kyverno
    schedule: daily
  - product: envoy
    schedule: daily
  - product: etcd
    schedule: daily

artifact_hub:
  search_url: "https://artifacthub.io/api/v1/packages/search"
  params:
    kind: 0  # Helm charts
    sort: stars
    limit: 50
  schedule: daily
  description: "Top Helm chart version updates"
