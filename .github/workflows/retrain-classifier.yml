name: Retrain Classifier

on:
  repository_dispatch:
    types: [drift-detected]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual retrain"
        required: false
        default: "manual"

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            -e ".[ml]" accelerate

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Train model
        id: train
        env:
          S3_BUCKET: kube-news-raw
          DYNAMODB_TABLE: kube-news
          AWS_REGION: eu-north-1
          CLASSIFIER_S3_PREFIX: models/classifier/
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python models/classifier/train.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update classifier model to v${{ steps.train.outputs.MODEL_VERSION }}"
          branch: retrain/v${{ steps.train.outputs.MODEL_VERSION }}
          title: "Update classifier to v${{ steps.train.outputs.MODEL_VERSION }}"
          body: |
            Automated retraining triggered by: `${{ github.event_name }}`

            ## Metrics
            | Metric | Value |
            |--------|-------|
            | Accuracy | ${{ steps.train.outputs.ACCURACY }} |
            | F1 (weighted) | ${{ steps.train.outputs.F1_WEIGHTED }} |
            | Training samples | ${{ steps.train.outputs.NUM_SAMPLES }} |

            ## What changed
            - Fine-tuned DistilBERT on latest silver labels from zero-shot classifier
            - Model uploaded to S3 (`models/classifier/v${{ steps.train.outputs.MODEL_VERSION }}/`)
            - `CURRENT_MODEL` file updated with new S3 path

            ---
            Triggered by drift detection or manual dispatch.
          add-paths: models/classifier/CURRENT_MODEL
